<!doctype html><html lang="ka"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>Cashier | MLApartClothes</title><link rel="stylesheet" href="style.css"></head><body><main class="admin-shell"><header class="hero"><div><p class="eyebrow">Cashier</p><h1>სალაროს პანელი</h1><p>კოდით გატარება, ფასდაკლება, ქეში/ტერმინალი და დღის დახურვა.</p></div></header><section class="panel"><div class="split"><div class="form"><input id="cashierName" placeholder="მოლარის სახელი"><input id="codeInput" placeholder="პროდუქტის კოდი"><select id="productSelect"><option value="">ან აირჩიე პროდუქტი</option></select><select id="sizeSelect"><option value="">ზომა</option></select><input id="qtyInput" type="number" value="1" min="1" placeholder="რაოდენობა"><input id="discountInput" type="number" value="0" min="0" placeholder="ფასდაკლება ერთეულზე"><button id="addSaleItem">დამატება</button></div><div><h2>გატარება</h2><div id="saleItems" class="cart-items empty">ჯერ არაფერი დამატებულა</div><div class="cart-total"><span>ჯამი</span><b id="saleTotal">0₾</b></div><div class="form"><input id="cashAmount" type="number" placeholder="ქეში"><input id="cardAmount" type="number" placeholder="ტერმინალი"><button id="completeSale">გაყიდვის დასრულება</button><button class="secondary" id="closeDay">დღის დახურვა</button></div></div></div></section><section class="panel"><h2>დაბალი ნაშთი და გაყიდვადი</h2><div id="cashierAnalytics"></div></section></main><div id="toast" class="toast"></div><script src="config.js"></script><script src="cashier.js"></script></body></html>
