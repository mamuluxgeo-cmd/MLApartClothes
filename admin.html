<!doctype html><html lang="ka"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>Admin | MLApartClothes</title><link rel="stylesheet" href="style.css"></head><body><main class="admin-shell"><header class="hero"><div><p class="eyebrow">Admin Panel</p><h1>სამართავი პანელი</h1><p>პროდუქცია, ფოტოები, შეკვეთები, სურვილები და ანალიტიკა.</p></div></header><nav class="nav"><button class="active" data-tab="productsTab">პროდუქცია</button><button data-tab="ordersTab">შეკვეთები</button><button data-tab="wishTab">სურვილები</button><button data-tab="analyticsTab">ანალიტიკა</button></nav><section id="productsTab" class="panel tab"><div class="split"><form id="positionForm" class="form"><h2>პოზიციის დამატება</h2><input name="NameKA" placeholder="პოზიცია ქართულად" required><input name="NameEN" placeholder="Position English"><input name="NameRU" placeholder="Позиция русский"><button>დამატება</button></form><form id="productForm" class="form"><h2>პროდუქტის დამატება</h2><input name="Code" placeholder="კოდი შენით მიუთითე *" required><select name="PositionID" id="adminPosition" required></select><input name="NameKA" placeholder="დასახელება ქართულად *" required><input name="NameEN" placeholder="Name English"><input name="NameRU" placeholder="Название русский"><input name="OldPrice" type="number" placeholder="ძველი ფასი"><input name="Price" type="number" placeholder="ახალი ფასი *" required><textarea name="DescriptionKA" placeholder="აღწერა ქართულად"></textarea><label>ფოტოები, პირველი იქნება მთავარი</label><input id="photoInput" type="file" accept="image/*" multiple required><div id="photoPreview" class="chips"></div><label>ზომები და რაოდენობები</label><div id="sizesBox"></div><button type="button" class="secondary" id="addSizeBtn">ზომის დამატება</button><button>პროდუქტის შენახვა</button></form></div><h2>არსებული პროდუქცია</h2><div id="productsTable"></div></section><section id="ordersTab" class="panel tab" hidden><h2>შეკვეთები</h2><div id="ordersTable"></div></section><section id="wishTab" class="panel tab" hidden><h2>კლიენტის სურვილები</h2><div id="wishTable"></div></section><section id="analyticsTab" class="panel tab" hidden><h2>ანალიტიკა</h2><div id="analyticsBox"></div></section></main><div id="toast" class="toast"></div><script src="config.js"></script><script src="admin.js"></script></body></html>
